name: Test Kasir App

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: PHP Syntax Check (php -l)
      run: |
        ERROR=0
        for file in $(find . -name "*.php" -not -path "./vendor/*"); do
          php -l "$file" || ERROR=1
        done
        exit $ERROR

  db-test:
    name: Database & Query Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: kasir_toko
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
        ports:
          - 3306:3306

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mysqli

    - name: Create config.php for CI
      run: |
        cat > config.php << 'EOF'
        <?php
        $DB_HOST = "127.0.0.1";
        $DB_USER = "root";
        $DB_PASS = "root";
        $DB_NAME = "kasir_toko";
        $conn = mysqli_connect($DB_HOST, $DB_USER, $DB_PASS, $DB_NAME);
        if (!$conn) {
            die("Koneksi database gagal: " . mysqli_connect_error());
        }
        EOF

    - name: Import Database Schema
      run: |
        mysql -h 127.0.0.1 -u root -proot kasir_toko < database.sql

    - name: Run Smoke Tests
      run: |
        php test.php
