name: PHP Checks & Tests

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    name: PHP Syntax Check
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
    
    - name: Check PHP files
      run: |
        for file in *.php; do
          if [ -f "$file" ]; then
            php -l "$file"
          fi
        done

  validate-files:
    runs-on: ubuntu-latest
    name: Validate Required Files
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check config.php
      run: test -f config.php && echo "config.php exists" || echo "config.php not found"
    
    - name: Check database.sql
      run: test -f database.sql && echo "database.sql exists" || echo "database.sql not found"
    
    - name: Check README
      run: test -f README.md && echo "README.md exists" || (echo "README.md not found" && exit 1)

  build-success:
    runs-on: ubuntu-latest
    name: Build Success
    needs: [php-syntax, validate-files]
    if: always()
    
    steps:
    - name: All checks passed
      run: echo "All GitHub Actions checks completed successfully"
